name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]
        laravel: [ '10.*', '11.*', '12.*', '13.*' ]
        exclude:
          - php: '8.1'
            laravel: '12.*'
          - php: '8.1'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.laravel == '10.*' && '8.*' || matrix.laravel == '11.*' && '9.*' || matrix.laravel == '12.*' && '9.*' || '10.*' }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: composer test